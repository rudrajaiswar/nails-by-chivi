<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Bookings — Nails By Chivi</title>
  <link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --black: #0d0a0b; --deep: #120e10; --card: #1a1419;
      --rose: #c9a07a; --rose-light: #dfc09a; --muted: #9a8880;
      --text: #e8ddd4; --border: rgba(201,160,122,0.18);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Jost', sans-serif; background: var(--black); color: var(--text); min-height: 100vh; }
    
    header {
      padding: 1.5rem 2.5rem;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      background: var(--deep);
    }
    header h1 { font-family: 'Playfair Display', serif; font-size: 1.5rem; color: var(--rose-light); }
    header a { color: var(--muted); text-decoration: none; font-size: 0.8rem; letter-spacing: 0.1em; }
    header a:hover { color: var(--rose); }

    .container {
      max-width: 800px;
      margin: 4rem auto;
      padding: 2rem;
      background: var(--card);
      border: 1px solid var(--border);
    }

    .form-group { margin-bottom: 1.2rem; }
    .form-group label { display: block; font-size: 0.75rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.4rem; }
    .form-group input { width: 100%; background: var(--black); border: 1px solid var(--border); color: var(--text); padding: 0.8rem; font-family: 'Jost', sans-serif; outline: none; }
    .form-group input:focus { border-color: var(--rose); }

    .btn { padding: 0.9rem; width: 100%; background: var(--rose); color: var(--black); border: none; font-family: 'Jost', sans-serif; font-weight: 600; letter-spacing: 0.15em; text-transform: uppercase; cursor: pointer; transition: background 0.2s; }
    .btn:hover { background: var(--rose-light); }

    #historyContainer {
      margin-top: 3rem;
    }

    .booking-card {
      background: var(--black);
      border: 1px solid var(--border);
      padding: 1.5rem;
      margin-bottom: 1rem;
      position: relative;
    }
    .booking-card h3 { color: var(--rose-light); margin-bottom: 0.5rem; }
    .booking-card .date { font-size: 0.85rem; color: var(--muted); margin-bottom: 0.5rem; }
    .booking-card .status { 
      position: absolute; top: 1.5rem; right: 1.5rem;
      font-size: 0.7rem; font-weight: 600; padding: 0.3rem 0.6rem; text-transform: uppercase; border-radius: 2px;
    }
    .status.pending { background: rgba(255,213,100,0.15); color: #ffd564; }
    .status.confirmed { background: rgba(144,238,144,0.15); color: #90ee90; }
    .status.completed { background: rgba(201,160,122,0.15); color: var(--rose); }
    .status.cancelled { background: rgba(238,100,100,0.1); color: #ee8888; }
  </style>
</head>
<body>
  <header>
    <h1>My Bookings</h1>
    <a href="/">← Back to Website</a>
  </header>

  <div class="container">
    <h2 style="font-family: 'Playfair Display', serif; color: var(--rose-light); margin-bottom: 1rem; text-align:center;">Check Your Appointment Details</h2>
    <p style="text-align:center; color: var(--muted); font-size: 0.9rem; margin-bottom: 2rem;">Enter the 10-digit mobile number you used to book your reservation.</p>
    
    <form id="searchForm">
      <div class="form-group">
        <label>Phone Number</label>
        <input type="tel" id="phone" placeholder="Enter 10-digit mobile" required />
      </div>
      <button type="submit" class="btn">Search Bookings ✦</button>
    </form>

    <div id="historyContainer"></div>
  </div>

  <script>
    document.getElementById('searchForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const phone = document.getElementById('phone').value;
      const historyContainer = document.getElementById('historyContainer');
      const btn = document.querySelector('.btn');
      
      btn.textContent = 'Searching...';
      historyContainer.innerHTML = '';

      try {
        const res = await fetch(`/api/appointments/client/${phone}`);
        const result = await res.json();

        if (result.success && result.data.length > 0) {
          historyContainer.innerHTML = result.data.map(b => `
            <div class="booking-card">
              <span class="status ${b.status}">${b.status}</span>
              <h3>${b.service}</h3>
              <div class="date">📅 ${new Date(b.date).toLocaleDateString('en-IN', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' })} at ${b.time}</div>
              <p style="font-size: 0.8rem; color: var(--muted); margin-top: 0.5rem;">Venue: ${b.venue}</p>
            </div>
          `).join('');
        } else {
          historyContainer.innerHTML = `<p style="text-align: center; color: var(--muted);">No bookings found for ${phone}.</p>`;
        }
      } catch (err) {
        historyContainer.innerHTML = `<p style="text-align: center; color: #ee8888;">Server error, please try later.</p>`;
      } finally {
        btn.textContent = 'Search Bookings ✦';
      }
    });
  </script>
</body>
</html>
