<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login — Nails By Chivi</title>
  <link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --black: #0d0a0b; --deep: #120e10; --card: #1a1419;
      --rose: #c9a07a; --rose-light: #dfc09a; --muted: #9a8880;
      --text: #e8ddd4; --border: rgba(201,160,122,0.18);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Jost', sans-serif; background: var(--black); color: var(--text); display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    
    .auth-container {
      background: var(--card); border: 1px solid var(--border);
      padding: 3rem; width: 100%; max-width: 400px;
    }
    .auth-container h2 { font-family: 'Playfair Display', serif; color: var(--rose-light); font-size: 1.8rem; margin-bottom: 1rem; text-align: center; }
    .auth-container p { color: var(--muted); text-align: center; font-size: 0.85rem; margin-bottom: 2rem; }
    
    .form-group { margin-bottom: 1.2rem; }
    .form-group label { display: block; font-size: 0.75rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.4rem; }
    .form-group input { width: 100%; background: var(--black); border: 1px solid var(--border); color: var(--text); padding: 0.8rem; font-family: 'Jost', sans-serif; outline: none; transition: border-color 0.2s; }
    .form-group input:focus { border-color: var(--rose); }
    
    .btn-auth { width: 100%; padding: 0.9rem; background: var(--rose); color: var(--black); border: none; font-family: 'Jost', sans-serif; font-weight: 600; letter-spacing: 0.15em; text-transform: uppercase; cursor: pointer; transition: background 0.2s; margin-top: 1rem; }
    .btn-auth:hover { background: var(--rose-light); }
    
    .auth-links { text-align: center; margin-top: 1.5rem; font-size: 0.85rem; }
    .auth-links a { color: var(--rose); text-decoration: none; }
    .auth-links a:hover { color: var(--rose-light); }
    
    .alert { padding: 0.8rem; margin-bottom: 1rem; display: none; font-size: 0.9rem; text-align: center; border: 1px solid transparent; }
    .alert.error { display: block; color: #ee8888; background: rgba(238,100,100,0.1); border-color: rgba(238,100,100,0.2); }
    .alert.success { display: block; color: #90ee90; background: rgba(144,238,144,0.1); border-color: rgba(144,238,144,0.2); }
  </style>
</head>
<body>
  <div class="auth-container">
    <h2>Welcome Back 🌸</h2>
    <p>Sign in to access the Dashboard</p>
    
    <div id="alertBox" class="alert"></div>

    <form id="loginForm">
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="email" required />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" required />
      </div>
      <button type="submit" class="btn-auth">Login</button>
    </form>
    
    <div class="auth-links">
      Don't have an account? <a href="/register.html">Register</a>
    </div>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const alertBox = document.getElementById('alertBox');
      
      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();
        
        if (data.success) {
          localStorage.setItem('token', data.token);
          alertBox.className = 'alert success';
          alertBox.textContent = 'Login successful! Redirecting...';
          setTimeout(() => window.location.href = '/admin.html', 1000);
        } else {
          alertBox.className = 'alert error';
          alertBox.textContent = data.message;
        }
      } catch (err) {
        alertBox.className = 'alert error';
        alertBox.textContent = 'Server error';
      }
    });
  </script>
</body>
</html>
